<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simone Locarni - Pianist | Composer | Improviser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body, html {
      height: 100%;
      font-family: 'Times New Roman', Georgia, serif;
    }
    
    .hero {
      background-image: url('images/hero.jpg');
      background-size: cover;
      background-position: 45% 25%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    
    .content {
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    }
    
    h1 {
      font-size: 4em;
      margin-bottom: 0.2em;
      font-weight: normal;
    }
    
    p {
      font-size: 1.5em;
      margin-top: 0;
      letter-spacing: 0.1em;
    }
    
    .buttons {
      margin-top: 2em;
    }
    
    .buttons a {
      color: white;
      border: 2px solid white;
      padding: 0.7em 2em;
      text-decoration: none;
      margin: 0 0.5em;
      display: inline-block;
      font-size: 1.1em;
      transition: all 0.3s ease;
    }
    
    .buttons a:hover {
      background-color: white;
      color: black;
    }
    
    /* Animazione cascata dall'alto */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .content h1 {
      animation: fadeInDown 2s ease 0.5s forwards;
      opacity: 0;
    }
    
    .content p {
      animation: fadeInDown 2s ease 1.5s forwards;
      opacity: 0;
    }
    
    .buttons {
      animation: fadeInDown 2s ease 2.5s forwards;
      opacity: 0;
    }
    
    /* Solo per cellulare */
    @media (max-width: 767px) {
      .hero {
        align-items: flex-end;
        padding-bottom: 15vh;
      }
      
      h1 {
        font-size: 2.5em;
      }
      
      p {
        font-size: 1.2em;
      }
      
      .buttons a {
        font-size: 0.9em;
        padding: 0.5em 1.5em;
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="content">
      <h1>Simone Locarni</h1>
      <p>Pianist | Composer | Improviser</p>
      <div class="buttons">
        <a href="bio/">→ Bio</a>
        <a href="concerti/">→ Concerti</a>
      </div>
    </div>
  </div>
</body>
</html>
