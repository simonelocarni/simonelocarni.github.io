<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simone Locarni - Pianist | Composer | Improviser</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body, html {
      height: 100%;
      font-family: 'Playfair Display', Georgia, serif;
    }
    
    .hero {
      background-image: url('images/hero.jpg');
      background-size: cover;
      background-position: 45% 20%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    
    .content {
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    }
    
    h1 {
      font-size: 4em;
      margin-bottom: 0.2em;
      font-weight: normal;
    }
    
    p {
      font-size: 1.5em;
      margin-top: 0;
      letter-spacing: 0.1em;
    }
    
    .buttons {
      margin-top: 2em;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 1em;
    }
    
    .buttons a {
      color: white;
      border: 2px solid white;
      padding: 0.7em 2em;
      text-decoration: none;
      margin: 0 0.5em;
      display: inline-block;
      font-size: 1.1em;
      transition: all 0.3s ease;
    }
    
    .buttons a:hover {
      background-color: white;
      color: black;
    }
    
    /* Animazione cascata dall'alto */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .content h1 {
  opacity: 0;
  animation: fadeInDown 1s ease 0.3s forwards !important;
}

.content p {
  opacity: 0;
  animation: fadeInDown 1s ease 0.8s forwards !important;
}

.buttons {
  opacity: 0;
  animation: fadeInDown 1s ease 1.3s forwards !important;
}
    
    /* Solo per PC */
    @media (min-width: 768px) {
      .hero {
        align-items: flex-start;
        padding-top: 25vh;
      }
    }
    
    /* Solo per cellulare */
@media (max-width: 767px) {
  .hero {
    align-items: center;
    padding-bottom: 15vh;
  }

  .content {
    padding-top: 60vh; /* sposta SOLO il testo più giù */
  }
  
  h1 {
    font-size: 2.5em;
  }
  
  p {
    font-size: 1.2em;
  }
  
  .buttons {
    gap: 1em; /* più spazio tra i bottoni */
    margin-top: 1em;
  }
  
  .buttons a {
    padding: 0.4em 1.2em;
    font-size: 0.9em;
  }
}
  </style>
</head>
<body>
  <div class="hero">
    <div class="content">
      <h1>Simone Locarni</h1>
      <p>Pianist | Composer | Improviser</p>
      <div class="buttons">
        <a href="https://simonelocarni.github.io/bio/">→ Bio</a>
        <a href="concerti/">→ Concerti</a>
        <a href="gallery/">→ Gallery</a>
        <a href="news/">→ News</a>
        <a href="contact/">→ Contact</a>
      </div>
    </div>
  </div> 
</body>
</html>
