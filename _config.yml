title: "Simone Locarni"
name: "Simone Locarni"
email: "simonelocarni99@gmail.com"
description: "Pianist | Composer | Improviser"
baseurl: ""
url: "https://simonelocarni.github.io"

repository: "simonelocarni/simonelocarni.github.io"

minimal_mistakes_skin: "dark"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

paginate: 5
paginate_path: /page:num/

author:
  name: "Simone Locarni"
  avatar: "/images/foto.jpg"
  bio: "Pianist | Composer | Improviser"
  location: "Italia"

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
      classes: wide

  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      classes: wide
